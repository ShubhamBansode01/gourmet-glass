<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="canonical" href="https://gourmet-glass-ymhc.vercel.app/" />
    <title>GourmetGlass | Premium AI Recipe Suite</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3270514748820824" crossorigin="anonymous"></script>
</head>
<body class="dark-theme">

    <header class="main-header">
        <div class="logo">Foodie<span>Glass</span></div>
        <nav class="nav-links">
            <a href="#home">Home</a>
            <a href="#menu">Menu</a>
            <a href="about.html">About</a>
        </button>
    </header>

    <section class="hero-section">
        <div class="hero-content">
            <h1>Your Favourite Food <br><span>Curated by AI</span></h1>
            <p>Healthy switcher chefs do all the prep work, providing high-performance recipe guides for your daily lifestyle.</p>
            <button class="cta-btn" onclick="document.getElementById('menu').scrollIntoView()">Explore Menu</button>
        </div>
        <div class="hero-image">
            <div class="orange-blob"></div>
            <img src="https://www.themealdb.com/images/ingredients/Lime.png" alt="Featured Dish" loading="lazy">
        </div>
    </section>

    <main class="container" id="menu">
        <div class="section-title">
            <h2>Explore Our Best Menu</h2>
            <div class="categories" id="categoryList">
                <button class="cat-btn active" data-category="Beef">Beef</button>
                <button class="cat-btn" data-category="Chicken">Chicken</button>
                <button class="cat-btn" data-category="Dessert">Dessert</button>
                <button class="cat-btn" data-category="Seafood">Seafood</button>
            </div>
        </div>

        <div id="mealGrid" class="meal-grid">
            </div>
    </main>

    <div class="modal" id="recipeModal">
        <div class="modal-content" id="modalContent"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
