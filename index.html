<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GourmetGlass | AI Food Explorer</title>
    <link rel="manifest" href="manifest.json">
    <meta name="description" content="Premium Glassmorphic Food App with AI-curated recipes.">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-theme">

    <header class="sticky-header">
        <div class="header-top">
            <div class="logo">GOURMET <span style="font-weight:300;">GLASS</span></div>
            <div class="header-actions">
                <button id="refresh-btn" class="icon-btn">🔄</button>
                <button id="theme-toggle" class="theme-btn">🌓</button>
            </div>
        </div>
        <div class="search-wrapper">
            <div class="search-box">
                <span class="search-icon">🔍</span>
                <input type="text" id="searchInput" placeholder="Search by name or ingredient...">
            </div>
        </div>
        <div class="categories" id="categoryList">
            <button class="cat-btn active" data-category="Beef">Beef</button>
            <button class="cat-btn" data-category="Chicken">Chicken</button>
            <button class="cat-btn" data-category="Dessert">Dessert</button>
            <button class="cat-btn" data-category="Seafood">Seafood</button>
            <button class="cat-btn" data-category="Pasta">Pasta</button>
        </div>
    </header>

    <div class="container">
        <div id="ad-segment-top" class="ads-hidden-segment">
            <div class="ad-label">SPONSORED GOURMET CONTENT</div>
        </div>
        <main class="meal-grid" id="mealGrid"></main>
    </div>

    <nav class="bottom-nav">
        <a href="#" class="nav-item active" id="nav-home">🏠 <span class="nav-label">EXPLORE</span></a>
        <a href="#" class="nav-item" id="fav-trigger">❤️ <span class="nav-label">SAVED</span></a>
    </nav>

    <div class="modal" id="recipeModal">
        <div class="modal-content" id="modalContent"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
